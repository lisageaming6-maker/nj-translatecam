name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'nj-translatecam/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'nj-translatecam/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: nj-translatecam
        run: flutter pub get

      - name: Patch minSdk to 21 (required by ML Kit)
        working-directory: nj-translatecam/android
        run: |
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/' app/build.gradle || \
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' app/build.gradle || \
          sed -i 's/minSdk [0-9]*/minSdk 21/' app/build.gradle || true

      - name: Analyze (non-blocking)
        working-directory: nj-translatecam
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        working-directory: nj-translatecam
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nj-translatecam-release-apk
          path: nj-translatecam/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Print APK size
        run: |
          APK=nj-translatecam/build/app/outputs/flutter-apk/app-release.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
