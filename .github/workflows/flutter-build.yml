name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'nj-translatecam/**'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'nj-translatecam/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Write local.properties
        working-directory: nj-translatecam/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "flutter.versionCode=1" >> local.properties
          echo "flutter.versionName=1.0.0" >> local.properties

      - name: Flutter clean
        working-directory: nj-translatecam
        run: flutter clean

      - name: Get dependencies
        working-directory: nj-translatecam
        run: flutter pub get

      - name: Analyze (non-blocking)
        working-directory: nj-translatecam
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        working-directory: nj-translatecam
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nj-translatecam-release-apk
          path: nj-translatecam/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Print APK size
        run: |
          APK=nj-translatecam/build/app/outputs/flutter-apk/app-release.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
