name: nj_translatecam
description: NJ TranslateCam - Camera-based OCR and on-device translation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera live preview & capture
  camera: ^0.11.0+2

  # ML Kit OCR
  google_mlkit_text_recognition: ^0.13.1

  # ML Kit on-device translation
  google_mlkit_translation: ^0.9.0

  # Persistent key-value storage
  shared_preferences: ^2.3.2

  # Text-to-speech
  flutter_tts: ^4.2.0

  # Native share sheet
  share_plus: ^10.1.4

  # Gallery / file picker
  image_picker: ^1.1.2

  # Helpers
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
