name: nj_translatecam
description: NJ TranslateCam - A Flutter camera translation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Camera
  camera: ^0.10.5+9

  # Image picking
  image_picker: ^1.1.2

  # HTTP requests
  http: ^1.2.1

  # Permission handling
  permission_handler: ^11.3.1

  # Local storage
  shared_preferences: ^2.2.3

  # Path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
